<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Petrobras Secure AI</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar">
  <div class="logo">BR PETROBRAS</div>
  <div id="clock"></div>
  <ul>
    <li onclick="goHome()">Início</li>
    <li onclick="showMonitor()">Monitoramento</li>
    <li onclick="showSupport()">Suporte</li>
    <li onclick="logout()">Sair</li>
  </ul>
</nav>

<section id="loginScreen" class="center">
  <h2>Acesso Seguro</h2>
  <input type="text" id="username" placeholder="Usuário">
  <button onclick="login()">Entrar</button>
</section>

<section id="chatSection" class="hidden dashboard">
  <div class="panel">

    <h2>Assistente Corporativo</h2>

    <div id="chatBox"></div>

    <div class="inputArea">
      <input type="text" id="userInput" placeholder="Digite...">
      <button onclick="sendMessage()">Enviar</button>
    </div>

    <div class="actions">
      <button onclick="reportLost()">🚨 Perdi os Óculos</button>
      <button onclick="toggleDevice()">🔄 Bloquear Dispositivo</button>
    </div>

    <div id="lostPanel" class="hidden lostPanel">
      <h3>Recuperação</h3>
      <input type="text" id="deviceCode" placeholder="Código">
      <input type="password" id="biometric" placeholder="Biometria">
      <button onclick="recoverDevice()">Validar</button>
    </div>

  </div>
</section>

<section id="monitorScreen" class="hidden center">
  <div class="panel">
    <h2>Monitoramento</h2>
    <p>ID: <span id="mon_id"></span></p>
    <p>Status: <span id="mon_status"></span></p>
    <p>Última atualização: <span id="mon_time"></span></p>
    <button onclick="goHome()">Voltar</button>
  </div>
</section>

<section id="supportScreen" class="hidden center">
  <div class="panel">
    <h2>Suporte</h2>
    <a href="tel:+5511999999999">📞 +55 11 99999-9999</a>
    <br><br>
    <button onclick="goHome()">Voltar</button>
  </div>
</section>

<script src="script.js"></script>
</body>
</html>
